<!-- Bouton déclencheur create -->
<button *ngIf="mode === 'create'"
        pButton
        icon="pi pi-plus"
        label="Ajouter"
        class="p-button-sm"
        style="background: transparent; border: 2px solid white; color: white;"
        (click)="handleShow()">
</button>

<!-- Bouton déclencheur edit -->
<button *ngIf="mode === 'edit'"
        pButton
        icon="pi pi-pencil"
        class="p-button-rounded p-button-sm"
        style="background: #16A34A; border-color: #16A34A; color: white;"
        (click)="handleShow()">
</button>

<!-- Dialog -->
<p-dialog
    [(visible)]="showForm"
    [modal]="true"
    appendTo="body"
    [header]="mode === 'create' ? 'Nouvelle Dépense' : 'Modifier Dépense'"
    [style]="{width: 'min(650px, 95vw)'}"
    [draggable]="false"
    [resizable]="false">

  <p class="text-color-secondary mt-0 mb-3" style="font-size: 0.95rem;">
    Enregistrez rapidement une dépense de votre ferme
  </p>

  <form [formGroup]="form" id="chargesForm" (ngSubmit)="handleSubmit()" class="flex flex-column gap-3">

    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Date de la dépense</label>
      <p-calendar formControlName="date" [showIcon]="true" dateFormat="dd/mm/yy"
                  [showButtonBar]="true" placeholder="Sélectionner une date"
                  styleClass="w-full" [inputStyle]="{height: '50px', fontSize: '1rem', borderRadius: '10px'}">
      </p-calendar>
    </div>

    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Type de dépense</label>
      <p-dropdown formControlName="typeDepenseId" [options]="typeDepenses"
                  optionLabel="nom" optionValue="id"
                  placeholder="Choisir un type" styleClass="w-full">
      </p-dropdown>
    </div>

    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Montant (FCFA)</label>
      <input pInputText type="number" formControlName="montant"
             placeholder="0" (input)="formatMontant()"
             class="w-full" style="height: 50px; font-size: 1.1rem; border-radius: 10px; font-weight: 500;" />

      <div class="flex flex-wrap gap-2 mt-2">
        <button *ngFor="let m of montantPresets"
                pButton type="button"
                class="p-button-outlined p-button-sm"
                [label]="(m | number) + ' F'"
                style="flex: 1 1 calc(33.33% - 0.5rem); min-width: 90px; border-color: #10b981; color: #059669;"
                (click)="applyMontant(m)">
        </button>
      </div>
    </div>

    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Description</label>
      <input pInputText formControlName="description"
             placeholder="Ex: Achat de sable pour construction"
             class="w-full" style="height: 50px; font-size: 1rem; border-radius: 10px;" />
    </div>

    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Mode de paiement</label>
      <p-dropdown formControlName="modePaiement" [options]="modesPaiement"
                  placeholder="Choisir un mode" styleClass="w-full">
      </p-dropdown>
    </div>

    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Observations <span class="text-color-secondary">(optionnel)</span></label>
      <textarea pInputTextarea rows="3" formControlName="observations"
                placeholder="Ajoutez des notes si nécessaire..."
                class="w-full" style="font-size: 0.95rem; border-radius: 10px; resize: vertical;"></textarea>
    </div>

  </form>

  <ng-template pTemplate="footer">
    <div class="flex justify-content-end gap-2">
      <button pButton label="Annuler" type="button"
              class="p-button-outlined p-button-secondary p-button-sm"
              (click)="showForm = false">
      </button>
      <button pButton
              [label]="mode === 'create' ? 'Enregistrer' : 'Mettre à jour'"
              icon="pi pi-check"
              class="p-button-success p-button-sm"
              form="chargesForm" type="submit"
              [loading]="processing">
      </button>
    </div>
  </ng-template>

</p-dialog>
