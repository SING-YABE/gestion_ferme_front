<button 
  *ngIf="mode === 'create'" 
  pButton 
  icon="pi pi-plus" 
  label="Nouvelle charge"
  class="p-button-success"
  style="background:#2E7D32; border-color:#2E7D32;"
  (click)="handleShow()">
</button>

<button 
  *ngIf="mode === 'edit'" 
  pButton 
  icon="pi pi-pencil" 
  class="p-button-rounded" 
  style="background:#4CAF50; border-color:#4CAF50;"
  (click)="handleShow()">
</button>

<p-dialog 
  [(visible)]="showForm" 
  [modal]="true"
  appendTo="body"
  header="💰 Nouvelle Dépense"
  [style]="{width: '95%', maxWidth: '650px'}"
  [breakpoints]="{'960px': '95vw', '640px': '98vw'}"
  styleClass="farm-dialog"
  [contentStyle]="{padding: '1.25rem'}"
>
  <p style="color: #6b7280; margin: -0.5rem 0 1.5rem; font-size: 0.95rem;">
    Enregistrez rapidement une dépense de votre ferme
  </p>

  <form [formGroup]="form" id="chargesForm" (ngSubmit)="handleSubmit()">
    
    <!-- Date -->
    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; margin-bottom: 0.5rem; color: #374151; font-weight: 500; font-size: 0.9rem;">
        📅 Date de la dépense
      </label>
      <p-calendar
        formControlName="date"
        [showIcon]="true"
        dateFormat="dd/mm/yy"
        [showButtonBar]="true"
        placeholder="Sélectionner une date"
        styleClass="w-full"
        [style]="{width: '100%'}"
        [inputStyle]="{height: '50px', fontSize: '1rem', borderRadius: '10px'}"
      ></p-calendar>
    </div>

    <!-- Type de dépense -->
    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; margin-bottom: 0.5rem; color: #374151; font-weight: 500; font-size: 0.9rem;">
        🏷️ Type de dépense
      </label>
      <p-dropdown 
        formControlName="typeDepenseId"
        [options]="typeDepenses"
        optionLabel="nom"
        optionValue="id"
        placeholder="Choisir un type"
        styleClass="w-full dropdown-custom"
        [style]="{width: '100%'}"
      ></p-dropdown>
    </div>

    <!-- Montant avec suggestions -->
    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; margin-bottom: 0.5rem; color: #374151; font-weight: 500; font-size: 0.9rem;">
        💵 Montant (FCFA)
      </label>
      <input
        pInputText
        type="number"
        formControlName="montant"
        placeholder="0"
        (input)="formatMontant()"
        style="width: 100%; height: 50px; font-size: 1.1rem; border-radius: 10px; font-weight: 500;"
      />
      
      <div style="margin-top: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.5rem;">
        <button 
          *ngFor="let m of montantPresets"
          pButton
          type="button"
          class="p-button-outlined"
          [label]="(m | number) + ' F'"
          style="flex: 1 1 calc(33.33% - 0.5rem); min-width: 90px; font-size: 0.9rem; padding: 0.5rem; border-radius: 8px; border-color: #10b981; color: #059669;"
          (click)="applyMontant(m)"
        >
        </button>
      </div>
    </div>

    <!-- Description -->
    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; margin-bottom: 0.5rem; color: #374151; font-weight: 500; font-size: 0.9rem;">
        ✏️ Description
      </label>
      <input 
        pInputText 
        formControlName="description"
        placeholder="Ex: Achat de sable pour construction"
        style="width: 100%; height: 50px; font-size: 1rem; border-radius: 10px;"
      />
    </div>

    <!-- Mode de paiement -->
    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; margin-bottom: 0.5rem; color: #374151; font-weight: 500; font-size: 0.9rem;">
        💳 Mode de paiement
      </label>
      <p-dropdown 
        formControlName="modePaiement"
        [options]="modesPaiement"
        placeholder="Choisir un mode"
        styleClass="w-full dropdown-custom"
        [style]="{width: '100%'}"
      ></p-dropdown>
    </div>

    <!-- Observations -->
    <div style="margin-bottom: 0;">
      <label style="display: block; margin-bottom: 0.5rem; color: #6b7280; font-weight: 500; font-size: 0.9rem;">
        📝 Observations <span style="font-weight: 400;">(optionnel)</span>
      </label>
      <textarea 
        pInputTextarea 
        rows="3" 
        formControlName="observations"
        placeholder="Ajoutez des notes si nécessaire..."
        style="width: 100%; font-size: 0.95rem; border-radius: 10px; resize: vertical;"
      ></textarea>
    </div>

  </form>

  <ng-template pTemplate="footer">
    <div style="display: flex; gap: 0.75rem; padding-top: 0.75rem;">
      <button 
        pButton 
        label="Annuler"
        class="p-button-text"
        type="button"
        (click)="showForm = false"
        style="flex: 1; padding: 0.75rem; color: #6b7280;">
      </button>
      <button 
        pButton 
        label="Enregistrer"
        icon="pi pi-check"
        class="p-button-success"
        form="chargesForm"
        type="submit"
        [loading]="processing"
        style="flex: 2; background:#059669; border-color:#059669; padding: 0.75rem 1.5rem; border-radius: 10px; font-weight: 500;">
      </button>
    </div>
  </ng-template>
</p-dialog>
