<div class="surface-card border-round-lg shadow-2 overflow-hidden">

  <!-- En-tête -->
  <div class="flex align-items-center justify-content-between flex-wrap gap-2 px-4 py-3"
       style="background: #2E7D32;">
    <div class="flex align-items-center gap-2">
      <i class="pi pi-file-edit text-white text-xl"></i>
      <h5 class="m-0 text-white font-semibold">Gestion des charges diverses</h5>
    </div>
    <app-chargesdiverses-form mode="create" (onUpdate)="loadData()"></app-chargesdiverses-form>
  </div>

  <!-- Table -->
  <p-table
    [value]="data"
    [loading]="loading"
    [rows]="pageSize"
    [paginator]="data.length > pageSize"
    [rowsPerPageOptions]="[5, 10, 30, 40]"
    styleClass="p-datatable-sm p-datatable-hoverable-rows p-datatable-gridlines"
    [tableStyle]="{'min-width': '30rem'}">

    <ng-template pTemplate="header">
      <tr>
        <th>Date</th>
        <th>Description</th>
        <th>Montant</th>
        <th>Mode de paiement</th>
        <th style="width: 110px; text-align: center;">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row.date }}</td>
        <td>{{ row.description }}</td>
        <td><strong>{{ row.montant }} FCFA</strong></td>
        <td>{{ row.modePaiement }}</td>
        <td>
          <div class="flex gap-1 justify-content-center">
            <app-chargesdiverses-form [target]="row" mode="edit" (onUpdate)="loadData()"></app-chargesdiverses-form>
            <button pButton icon="pi pi-trash"
                    class="p-button-rounded p-button-sm p-button-danger"
                    (click)="confirmDelete(row)"></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td [attr.colspan]="5">
          <div class="flex flex-column align-items-center py-6 text-color-secondary">
            <i class="pi pi-inbox text-5xl mb-3"></i>
            <span>Aucune charge trouvée</span>
          </div>
        </td>
      </tr>
    </ng-template>

  </p-table>
</div>

<p-confirmDialog [style]="{width: 'min(450px, 95vw)'}"></p-confirmDialog>
