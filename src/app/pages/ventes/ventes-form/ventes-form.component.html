<button
  pButton
  icon="pi pi-plus"
  label="Nouvelle vente"
  class="p-button-success"
  (click)="handleShow()">
</button>

<p-dialog
  header="Enregistrer une vente"
  [(visible)]="showForm"
  [modal]="true"
  [style]="{ width: '800px' }"
  appendTo="body">

  <form [formGroup]="form">

    <!-- Dates & Client -->
    <div class="grid">
      <div class="col-4">
        <div class="field">
          <label>Date de vente <span class="text-red-500">*</span></label>
          <p-calendar
            formControlName="dateVente"
            dateFormat="dd/mm/yy"
            [showIcon]="true"
            styleClass="w-full">
          </p-calendar>
        </div>
      </div>

      <div class="col-4">
        <div class="field">
          <label>Date d'enlèvement prévue</label>
          <p-calendar
            formControlName="dateEnlevement"
            dateFormat="dd/mm/yy"
            [showIcon]="true"
            styleClass="w-full">
          </p-calendar>
        </div>
      </div>

         <div class="col-4">
        <div class="field">
          <label>Date d'enlèvement au plus tard</label>
          <p-calendar
            formControlName="dateEnlevementAuPlusTard"
            dateFormat="dd/mm/yy"
            [showIcon]="true"
            styleClass="w-full">
          </p-calendar>
        </div>
      </div>

      <div class="col-4">
        <div class="field">
          <label>Client <span class="text-red-500">*</span></label>
          <input
            pInputText
            formControlName="client"
            placeholder="Nom du client"
            class="w-full">
        </div>
      </div>
    </div>

    <!-- Animaux -->
    <div class="field mt-3">
      <div class="flex justify-content-between align-items-center mb-2">
        <label class="font-bold">Animaux à vendre</label>
        <button
          pButton
          type="button"
          icon="pi pi-plus"
          label="Ajouter un animal"
          class="p-button-sm p-button-outlined"
          (click)="ajouterAnimal()">
        </button>
      </div>

      <div
        formArrayName="animaux"
        class="border-1 border-300 border-round p-3">

        <div *ngIf="animaux.length === 0"
             class="text-center text-500 py-4">
          Aucun animal ajouté
        </div>

        <div
          *ngFor="let animal of animaux.controls; let i = index"
          [formGroupName]="i"
          class="grid mb-3 p-3 border-1 border-200 border-round">

          <div class="col-12 mb-2 flex justify-content-between align-items-center">
            <strong>Animal {{ i + 1 }}</strong>
            <button
              pButton
              type="button"
              icon="pi pi-times"
              class="p-button-text p-button-sm"
              (click)="supprimerAnimal(i)">
            </button>
          </div>

          <div class="col-6">
            <label>Code Animal <span class="text-red-500">*</span></label>
            <p-dropdown
              formControlName="codeAnimal"
              [options]="animauxDisponibles"
              optionLabel="codeAnimal"
              optionValue="codeAnimal"
              placeholder="Sélectionner"
              [filter]="true"
              styleClass="w-full">
              <ng-template let-item pTemplate="item">
                <div>
                  <strong>{{ item.codeAnimal }}</strong>
                  <span class="ml-2 text-sm text-500">
                    ({{ item.typeAnimal.nom }} - {{ item.poidsInitial }} kg)
                  </span>
                </div>
              </ng-template>
            </p-dropdown>
          </div>

          <div class="col-6">
            <label>Type de vente <span class="text-red-500">*</span></label>
            <p-dropdown
              formControlName="typeVenteId"
              [options]="typesVente"
              optionLabel="nom"
              optionValue="id"
              placeholder="Sélectionner"
              styleClass="w-full">
            </p-dropdown>
          </div>

          <div class="col-4">
            <label>Poids (kg) <span class="text-red-500">*</span></label>
            <input
              pInputText
              type="number"
              step="0.1"
              formControlName="poidsVente"
              class="w-full">
          </div>

          <div class="col-4">
            <label>Prix unitaire <span class="text-red-500">*</span></label>
            <input
              pInputText
              type="number"
              formControlName="prixUnitaire"
              class="w-full">
          </div>

          <div class="col-4">
            <label>Montant</label>
            <div class="p-2 border-1 border-200 border-round text-right">
              <strong>
                {{ calculerMontantAnimal(i) | number:'1.0-0' }} FCFA
              </strong>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Montant total -->
    <div class="field mt-4 p-3 border-1 border-300 border-round">
      <div class="flex justify-content-between align-items-center">
        <strong>MONTANT TOTAL</strong>
        <strong style="font-size: 1.2rem;">
          {{ calculerMontantTotal() | number:'1.0-0' }} FCFA
        </strong>
      </div>
    </div>

  </form>

  <ng-template pTemplate="footer">
    <button
      pButton
      label="Annuler"
      class="p-button-outlined mr-2"
      (click)="showForm = false">
    </button>

    <button
      pButton
      label="Enregistrer la vente"
      icon="pi pi-check"
      class="p-button-success"
      [loading]="processing"
      [disabled]="form.invalid || animaux.length === 0"
      (click)="handleSubmit()">
    </button>
  </ng-template>

</p-dialog>
