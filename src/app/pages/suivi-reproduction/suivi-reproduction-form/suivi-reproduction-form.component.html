<button 
  pButton 
  class="p-button-success" 
  icon="pi pi-plus" 
  label="Ajouter reproduction"
  style="background:#2E7D32; border-color:#2E7D32;"
  (click)="handleShow()" 
  *ngIf="mode==='create'">
</button>

<p-dialog 
  [header]="mode === 'create' ? '🐷 Nouvelle Reproduction' : '📝 Suivi Reproduction'"
  [(visible)]="showForm"
  [modal]="true"
  [style]="{width: '95%', maxWidth: '700px'}"
  [breakpoints]="{'960px': '95vw', '640px': '98vw'}"
  appendTo="body"
  [draggable]="false"
  [resizable]="false"
  [contentStyle]="{padding: '1.5rem'}">

  <p class="dialog-subtitle">
    {{ mode === 'create' 
        ? 'Enregistrez une nouvelle saillie' 
        : 'Mettez à jour les informations de mise bas' }}
  </p>

  <form [formGroup]="form">

    <!-- ================= CREATE ================= -->
    <div *ngIf="mode==='create'" class="form-section">

      <div class="form-field">
        <label>🐖 Truie *</label>
        <p-dropdown 
          [options]="truies"
          formControlName="truieCode"
          placeholder="Sélectionnez une truie"
          class="full-width">
        </p-dropdown>
      </div>

      <div class="form-field">
        <label>🐗 Verrat *</label>
        <p-dropdown 
          [options]="verrats"
          formControlName="verratCode"
          placeholder="Sélectionnez un verrat"
          class="full-width">
        </p-dropdown>
      </div>

      <div class="form-field">
        <label>📅 Date Saillie *</label>
        <p-calendar 
          formControlName="dateSaillie"
          dateFormat="dd/mm/yy"
          [showIcon]="true"
          appendTo="body"
          class="full-width">
        </p-calendar>
      </div>

      <div class="form-field">
        <label>📝 Observations</label>
        <textarea 
          pInputTextarea
          formControlName="observations"
          rows="3"
          class="full-width">
        </textarea>
      </div>

    </div>


    <!-- ================= EDIT ================= -->
    <div *ngIf="mode==='edit'" class="form-section">

      <!-- Photos -->
      <div class="animals-container">

        <div class="animal-photo">
          <img *ngIf="target?.truie?.photoUrl"
               [src]="'http://localhost:8080' + target!.truie!.photoUrl" />
          <div *ngIf="!target?.truie?.photoUrl" class="no-photo">🐖</div>
          <div class="animal-label">
            {{ target?.truie?.codeAnimal }} - Box {{ target?.truie?.boxCode }}
          </div>
        </div>

        <div class="animal-photo">
          <img *ngIf="target?.verrat?.photoUrl"
               [src]="'http://localhost:8080' + target!.verrat!.photoUrl" />
          <div *ngIf="!target?.verrat?.photoUrl" class="no-photo"></div>
          <div class="animal-label">
            {{ target?.verrat?.codeAnimal }} - Box {{ target?.verrat?.boxCode }}
          </div>
        </div>

      </div>

      <!-- Dates en grille -->
      <div class="grid-2">

        <div class="form-field">
          <label>📅 Date Saillie</label>
          <p-calendar 
            formControlName="dateSaillie"
            dateFormat="dd/mm/yy"
            [showIcon]="true"
            appendTo="body"
            [disabled]="isPostMiseBas()"
            class="full-width">
          </p-calendar>
        </div>

        <div class="form-field">
          <label>✅ Date Mise Bas</label>
          <p-calendar 
            formControlName="dateMiseBasReelle"
            dateFormat="dd/mm/yy"
            [showIcon]="true"
            appendTo="body"
            [disabled]="isPostMiseBas()"
            class="full-width">
          </p-calendar>
        </div>

      </div>

      <!-- Statistiques -->
      <div class="grid-3">

        <div class="form-field">
          <label>💚 Nés Vivants</label>
          <input pInputText type="number" formControlName="nbNesVivants" class="full-width"/>
        </div>

        <div class="form-field">
          <label>💔 Morts Nés</label>
          <input pInputText type="number" formControlName="nbMortsNes" class="full-width"/>
        </div>

        <div class="form-field">
          <label>🎯 Sevrés</label>
          <input pInputText type="number" formControlName="nbSevres" class="full-width"/>
        </div>

      </div>

      <div class="form-field">
        <label>📝 Observations</label>
        <textarea 
          pInputTextarea
          formControlName="observations"
          rows="3"
          class="full-width">
        </textarea>
      </div>

    </div>

  </form>

  <ng-template pTemplate="footer">
    <div class="dialog-footer">
      <button 
        type="button"
        pButton 
        label="Annuler"
        class="p-button-text"
        (click)="showForm=false">
      </button>

      <button 
        type="button"
        pButton 
        label="Enregistrer"
        icon="pi pi-check"
        [disabled]="form.invalid"
        [loading]="processing"
        (click)="handleSubmit()"
        class="p-button-success">
      </button>
    </div>
  </ng-template>

</p-dialog>
