<!-- Bouton déclencheur create -->
<button *ngIf="mode === 'create'"
        pButton
        icon="pi pi-plus"
        label="Ajouter"
        class="p-button-sm"
        style="background: transparent; border: 2px solid white; color: white;"
        (click)="handleShow()">
</button>

<!-- Bouton déclencheur edit -->
<button *ngIf="mode === 'edit'"
        pButton
        icon="pi pi-pencil"
        class="p-button-rounded p-button-sm"
        style="background: #16A34A; border-color: #16A34A; color: white;"
        (click)="handleShow()">
</button>

<!-- Dialog -->
<p-dialog [(visible)]="showForm" [modal]="true" appendTo="body"
          [style]="{width: 'min(700px, 95vw)'}" [draggable]="false" [resizable]="false">

  <ng-template pTemplate="header">
    <div class="flex align-items-center gap-2">
      <i class="pi pi-heart" style="font-size: 1.5rem;"></i>
      <span class="text-xl font-semibold">Formulaire de Soin Animal</span>
    </div>
  </ng-template>

  <form [formGroup]="form" id="soinsForm" (ngSubmit)="handleSubmit()" class="flex flex-column gap-3 pt-2">

    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Type de soin</label>
      <div class="flex gap-4">
        <div class="flex align-items-center">
          <p-radioButton name="type" value="individuel" inputId="individuel" [(ngModel)]="typeSoin"
            [ngModelOptions]="{standalone: true}" (onClick)="onTypeSoinChange()">
          </p-radioButton>
          <label for="individuel" class="ml-2 cursor-pointer text-sm">
            <i class="pi pi-user mr-1"></i> Soin Individuel
          </label>
        </div>

        <div class="flex align-items-center">
          <p-radioButton name="type" value="collectif" inputId="collectif" [(ngModel)]="typeSoin"
            [ngModelOptions]="{standalone: true}" (onClick)="onTypeSoinChange()">
          </p-radioButton>
          <label for="collectif" class="ml-2 cursor-pointer text-sm">
            <i class="pi pi-users mr-1"></i> Soin Collectif
          </label>
        </div>
      </div>
    </div>

    <div *ngIf="isIndividuel" class="flex flex-column gap-1">
      <label class="font-medium text-sm">Sélection de l'animal</label>
      <p-dropdown formControlName="codeAnimal" [options]="animals" optionLabel="label" optionValue="value"
        placeholder="Choisir un animal..." [filter]="true" filterBy="label" [showClear]="true" styleClass="w-full"
        [style]="{'height': '45px'}">
      </p-dropdown>
    </div>

    <div *ngIf="isCollectif" class="flex flex-column gap-1">
      <label class="font-medium text-sm">Sélection des animaux</label>

      <div class="flex align-items-center gap-2 mb-2">
        <p-checkbox formControlName="applyToAll" [binary]="true" inputId="applyToAll"></p-checkbox>
        <label for="applyToAll" class="mb-0 cursor-pointer text-sm">
          Appliquer à tous les animaux ({{ animals.length }} animaux)
        </label>
      </div>

      <p-multiSelect formControlName="animalCodes" [options]="animals" optionLabel="label" optionValue="value"
        placeholder="Ajouter des animaux..." [filter]="true" filterBy="label" [showClear]="true" display="chip"
        styleClass="w-full" [style]="{'min-height': '45px'}">
      </p-multiSelect>
    </div>

    <div class="grid">
      <div class="col-6">
        <div class="flex flex-column gap-1">
          <label class="font-medium text-sm">Date du soin *</label>
          <p-calendar formControlName="dateSoin" dateFormat="dd/mm/yy" [showIcon]="true" styleClass="w-full"
            [inputStyle]="{'height': '45px'}">
          </p-calendar>
        </div>
      </div>

      <div class="col-6">
        <div class="flex flex-column gap-1">
          <label class="font-medium text-sm">Vétérinaire</label>
          <textarea pInputTextarea formControlName="veterinaire" rows="2" placeholder="Dr KABORE" class="w-full"></textarea>
        </div>
      </div>
    </div>

    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Motif *</label>
      <textarea pInputTextarea formControlName="motif" rows="2"
                placeholder="Ex: Contrôle annuel, maladie..." class="w-full"></textarea>
    </div>

    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Traitement *</label>
      <p-dropdown formControlName="traitement" [options]="traitements" optionLabel="nom" optionValue="nom"
        placeholder="Choisir un traitement..." [filter]="true" [showClear]="true" styleClass="w-full"
        [style]="{'height': '45px'}">
      </p-dropdown>
    </div>

    <div class="grid">
      <div class="col-6">
        <div class="flex flex-column gap-1">
          <label class="font-medium text-sm">Coût prestation (FCFA)</label>
          <p-inputNumber formControlName="cout" mode="decimal" [minFractionDigits]="2" [maxFractionDigits]="2"
                         [min]="0" placeholder="0.00" styleClass="w-full" [inputStyle]="{'height': '45px'}">
          </p-inputNumber>
        </div>
      </div>

      <div class="col-6">
        <div class="flex flex-column gap-1">
          <label class="font-medium text-sm">Coût médicament (FCFA)</label>
          <p-inputNumber formControlName="coutMedicament" mode="decimal" [minFractionDigits]="2" [maxFractionDigits]="2"
                         [min]="0" placeholder="0.00" styleClass="w-full" [inputStyle]="{'height': '45px'}">
          </p-inputNumber>
        </div>
      </div>
    </div>

    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Total (FCFA)</label>
      <div class="w-full p-3 text-center font-bold"
        style="background: #e5e7eb; border-radius: 6px; font-size: 20px; padding: 12px;">
        {{ (form.get('cout')?.value || 0) + (form.get('coutMedicament')?.value || 0) | number:'1.2-2' }} FCFA
      </div>
    </div>

    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Observations</label>
      <textarea pInputTextarea formControlName="observations" rows="3"
                placeholder="Notes additionnelles..." class="w-full"></textarea>
    </div>

  </form>

  <ng-template pTemplate="footer">
    <div class="flex justify-content-end gap-2">
      <button pButton label="Réinitialiser"
              class="p-button-outlined p-button-secondary p-button-sm"
              (click)="resetForm()">
      </button>
      <button pButton
              [label]="mode === 'create' ? 'Enregistrer' : 'Mettre à jour'"
              icon="pi pi-check"
              class="p-button-success p-button-sm"
              [disabled]="processing || !form.valid"
              [loading]="processing"
              (click)="handleSubmit()">
      </button>
    </div>
  </ng-template>

</p-dialog>
