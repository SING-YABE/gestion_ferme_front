<!-- Bouton déclencheur create -->
<button pButton
        label="Ajouter"
        icon="pi pi-plus"
        class="p-button-sm"
        style="background: transparent; border: 2px solid white; color: white;"
        (click)="handleShowForm()">
</button>

<!-- Dialog -->
<p-dialog
    appendTo="body"
    [modal]="true"
    [dismissableMask]="true"
    [draggable]="false"
    [resizable]="false"
    [style]="{width: 'min(600px, 95vw)'}"
    [(visible)]="showForm">

  <ng-template pTemplate="header">
    <span class="font-semibold text-lg">Ajouter un Nouveau Rôle</span>
  </ng-template>

  <div class="flex flex-column gap-3 pt-2">
    <div class="flex flex-column gap-1">
      <label for="roleName" class="font-medium text-sm">Nom du rôle</label>
      <input id="roleName" [(ngModel)]="newRole.name" pInputText
             placeholder="Nom du rôle" class="w-full" />
    </div>

    <div class="flex flex-column gap-1">
      <label for="roleCode" class="font-medium text-sm">Code du rôle</label>
      <input id="roleCode" [(ngModel)]="newRole.code" pInputText
             placeholder="Code unique du rôle" class="w-full" />
    </div>

    <div class="flex flex-column gap-1">
      <label for="permissions" class="font-medium text-sm">Permissions</label>
      <p-multiSelect appendTo="body" id="permissions"
                     [options]="permissions"
                     [(ngModel)]="newRole.permissionsId"
                     optionLabel="name" optionValue="code"
                     placeholder="Sélectionner des permissions"
                     styleClass="w-full">
      </p-multiSelect>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex justify-content-end gap-2">
      <button type="button" pButton
              label="Annuler" icon="pi pi-times"
              class="p-button-outlined p-button-secondary p-button-sm"
              (click)="showForm = false">
      </button>
      <button pButton
              label="Enregistrer" icon="pi pi-check"
              class="p-button-success p-button-sm"
              [loading]="processing"
              (click)="handleAddRole()">
      </button>
    </div>
  </ng-template>

</p-dialog>
