<div class="surface-card border-round-lg shadow-2 overflow-hidden">

  <!-- En-tête -->
  <div class="flex align-items-center justify-content-between flex-wrap gap-2 px-4 py-3"
       style="background: #2E7D32;">
    <div class="flex align-items-center gap-2">
      <i class="pi pi-lock text-white text-xl"></i>
      <h5 class="m-0 text-white font-semibold">Gestion des rôles et permissions</h5>
    </div>
    <app-role-permission-form (onUpdate)="handleUpdate()"></app-role-permission-form>
  </div>

  <!-- Table -->
  <p-table
    [loading]="loading"
    [lazy]="true"
    [totalRecords]="rolesPage.totalElements"
    (onLazyLoad)="paginate($event)"
    [rows]="10"
    [rowsPerPageOptions]="[5, 10, 20]"
    [value]="roles || []"
    [paginator]="true"
    styleClass="p-datatable-sm p-datatable-hoverable-rows p-datatable-gridlines"
    [tableStyle]="{'min-width': '30rem'}">

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="name">Nom <p-sortIcon field="name"></p-sortIcon></th>
        <th pSortableColumn="code">Code <p-sortIcon field="code"></p-sortIcon></th>
        <th style="width: 110px; text-align: center;">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-role>
      <tr>
        <td><strong>{{ role.name }}</strong></td>
        <td>{{ role.code }}</td>
        <td>
          <div class="flex gap-1 justify-content-center">
            <button pButton icon="pi pi-eye"
                    class="p-button-rounded p-button-sm p-button-info"
                    (click)="showRoleDetails(role)"></button>
            <button pButton icon="pi pi-pencil"
                    class="p-button-rounded p-button-sm"
                    style="background: #16A34A; border-color: #16A34A; color: white;"
                    (click)="editRole(role)"></button>
            <button pButton icon="pi pi-trash"
                    class="p-button-rounded p-button-sm p-button-danger"
                    (click)="handleDelete(role)"></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td [attr.colspan]="3">
          <div class="flex flex-column align-items-center py-6 text-color-secondary">
            <i class="pi pi-inbox text-5xl mb-3"></i>
            <span>Aucun rôle trouvé</span>
          </div>
        </td>
      </tr>
    </ng-template>

  </p-table>

  <!-- Modal permissions -->
  <p-dialog [(visible)]="displayModal" [modal]="true" [closable]="false"
            [style]="{width: 'min(500px, 95vw)'}">
    <ng-template pTemplate="header">
      <span class="font-semibold">Permissions du rôle</span>
    </ng-template>
    <div *ngIf="selectedRole" class="pt-2">
      <h6>{{ selectedRole.name }} - {{ selectedRole.code }}</h6>
      <ul>
        <li *ngFor="let permission of selectedRole.permissions">
          {{ permission.name }}
        </li>
      </ul>
    </div>
    <ng-template pTemplate="footer">
      <div class="flex justify-content-end">
        <button pButton label="Fermer" icon="pi pi-times"
                class="p-button-outlined p-button-secondary p-button-sm"
                (click)="displayModal = false"></button>
      </div>
    </ng-template>
  </p-dialog>

  <!-- Modal édition rôle -->
  <p-dialog [(visible)]="editModal" [modal]="true" [closable]="false"
            [style]="{width: 'min(600px, 95vw)'}">
    <ng-template pTemplate="header">
      <span class="font-semibold">Modifier le Rôle</span>
    </ng-template>

    <div class="flex flex-column gap-3 pt-2">
      <div class="flex flex-column gap-1">
        <label for="roleName" class="font-medium text-sm">Nom du rôle</label>
        <input id="roleName" [(ngModel)]="editedRole.name" pInputText
               placeholder="Nom du rôle" class="w-full" />
      </div>

      <div class="flex flex-column gap-1">
        <label for="roleCode" class="font-medium text-sm">Code du rôle</label>
        <input id="roleCode" [(ngModel)]="editedRole.code" pInputText
               placeholder="Code unique du rôle" class="w-full" />
      </div>

      <div class="flex flex-column gap-1">
        <label for="permissions" class="font-medium text-sm">Permissions</label>
        <p-multiSelect appendTo="body" id="permissions"
                       [options]="permissionsList"
                       [(ngModel)]="editedRole.permissionsId"
                       optionLabel="name" optionValue="code"
                       placeholder="Sélectionner des permissions"
                       styleClass="w-full">
        </p-multiSelect>
      </div>
    </div>

    <ng-template pTemplate="footer">
      <div class="flex justify-content-end gap-2">
        <button pButton label="Annuler" icon="pi pi-times"
                class="p-button-outlined p-button-secondary p-button-sm"
                (click)="editModal = false"></button>
        <button pButton
                [label]="'Mettre à jour'" icon="pi pi-check"
                class="p-button-success p-button-sm"
                [loading]="processing"
                (click)="updateRole()"></button>
      </div>
    </ng-template>

  </p-dialog>

  <p-confirmDialog [style]="{width: 'min(450px, 95vw)'}"></p-confirmDialog>

</div>
