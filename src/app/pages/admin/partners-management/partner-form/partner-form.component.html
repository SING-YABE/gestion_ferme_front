<!-- Bouton déclencheur create -->
<button pButton
        label="Ajouter"
        icon="pi pi-plus"
        class="p-button-sm"
        style="background: transparent; border: 2px solid white; color: white;"
        (click)="showDialog = true">
</button>

<!-- Dialog -->
<p-dialog
    header="Nouveau partenaire"
    appendTo="body"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    [style]="{width: 'min(480px, 95vw)'}"
    [(visible)]="showDialog">

  <div class="flex flex-column gap-3 pt-2">
    <div class="flex flex-column gap-1">
      <label for="name" class="font-medium text-sm">Nom</label>
      <input id="name" type="text" pInputText placeholder="Nom du partenaire" class="w-full" />
    </div>
    <div class="flex flex-column gap-1">
      <label for="code" class="font-medium text-sm">Code</label>
      <input id="code" type="text" pInputText placeholder="Code du partenaire" class="w-full" />
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex justify-content-end gap-2">
      <button type="button" pButton
              label="Annuler" icon="pi pi-times"
              class="p-button-outlined p-button-secondary p-button-sm"
              (click)="showDialog = false">
      </button>
      <button pButton
              label="Enregistrer" icon="pi pi-check"
              class="p-button-success p-button-sm">
      </button>
    </div>
  </ng-template>

</p-dialog>
