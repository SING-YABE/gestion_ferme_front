<div class="surface-card border-round-lg shadow-2 overflow-hidden">

  <!-- En-tête -->
  <div class="flex align-items-center justify-content-between flex-wrap gap-2 px-4 py-3"
       style="background: #2E7D32;">
    <div class="flex align-items-center gap-2">
      <i class="pi pi-users text-white text-xl"></i>
      <h5 class="m-0 text-white font-semibold">Gestion des partenaires</h5>
    </div>
    <app-partner-form></app-partner-form>
  </div>

  <!-- Table -->
  <p-table
    [rows]="10"
    [rowsPerPageOptions]="[10, 30, 40]"
    [value]="partners"
    [paginator]="true"
    styleClass="p-datatable-sm p-datatable-hoverable-rows p-datatable-gridlines"
    [tableStyle]="{'min-width': '30rem'}">

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="name">Nom <p-sortIcon field="name"></p-sortIcon></th>
        <th pSortableColumn="processorType">Code <p-sortIcon field="processorType"></p-sortIcon></th>
        <th style="width: 110px; text-align: center;">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-partner>
      <tr>
        <td><strong>{{ partner.owner }}</strong></td>
        <td></td>
        <td>
          <div class="flex gap-1 justify-content-center">
            <button [routerLink]="['/admin/partners', partner.uuid]" pButton icon="pi pi-eye"
                    class="p-button-rounded p-button-sm p-button-info"></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td [attr.colspan]="3">
          <div class="flex flex-column align-items-center py-6 text-color-secondary">
            <i class="pi pi-inbox text-5xl mb-3"></i>
            <span>Aucun partenaire trouvé</span>
          </div>
        </td>
      </tr>
    </ng-template>

  </p-table>
</div>
