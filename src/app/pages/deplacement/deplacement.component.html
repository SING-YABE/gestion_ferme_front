<div class="surface-card border-round-lg shadow-2 overflow-hidden">

  <!-- En-tête -->
  <div class="flex align-items-center justify-content-between flex-wrap gap-2 px-4 py-3"
       style="background: #2E7D32;">
    <div class="flex align-items-center gap-2">
      <i class="pi pi-directions text-white text-xl"></i>
      <h5 class="m-0 text-white font-semibold">Historique des déplacements</h5>
    </div>
    <app-deplacement-form (onUpdate)="loadData()" mode="create"></app-deplacement-form>
  </div>

  <!-- Filtres -->
  <div class="px-4 pt-3 pb-2">
    <div class="flex flex-wrap align-items-end gap-3">

      <div class="flex flex-column gap-1">
        <label class="font-medium text-sm">Filtrer par animal :</label>
        <p-dropdown
          [options]="animaux"
          [(ngModel)]="filtreAnimalId"
          optionLabel="codeAnimal"
          optionValue="id"
          placeholder="Tous les animaux"
          [showClear]="true"
          [filter]="true"
          [style]="{width:'220px'}"
          (onChange)="onFiltreChange()">
        </p-dropdown>
      </div>

      <div class="flex flex-column gap-1">
        <label class="font-medium text-sm">Recherche motif :</label>
        <input pInputText type="text"
               [(ngModel)]="rechercheMotif"
               (ngModelChange)="onFiltreChange()"
               placeholder="Ex: Transfert..."
               style="height:40px; width:220px; border-radius:8px;" />
      </div>

      <button pButton label="Réinitialiser" icon="pi pi-refresh"
              class="p-button-outlined p-button-secondary p-button-sm"
              (click)="resetFiltres()">
      </button>

    </div>
  </div>

  <!-- Table -->
  <p-table
    [value]="historiqueFiltre"
    [loading]="loading"
    [rows]="pageSize"
    [rowsPerPageOptions]="[5, 10, 30, 40]"
    [paginator]="historiqueFiltre.length > pageSize"
    styleClass="p-datatable-sm p-datatable-hoverable-rows p-datatable-gridlines"
    [tableStyle]="{'min-width': '30rem'}"
    [sortField]="'dateDeplacement'"
    [sortOrder]="-1">

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="dateDeplacement">Date <p-sortIcon field="dateDeplacement"></p-sortIcon></th>
        <th>Animal</th>
        <th>Ancienne box</th>
        <th style="text-align: center;"></th>
        <th>Nouvelle box</th>
        <th>Motif</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-h>
      <tr>
        <td>{{ h.dateDeplacement | date:'dd/MM/yyyy HH:mm' }}</td>

        <td>
          <span style="background:#dbeafe; color:#1d4ed8;
                       padding:2px 10px; border-radius:20px;
                       font-size:0.85rem; font-weight:600;">
            {{ h.codeAnimal }}
          </span>
        </td>

        <td>
          <span *ngIf="h.ancienneBoxCode"
                style="background:#fee2e2; color:#b91c1c;
                       padding:2px 10px; border-radius:20px; font-size:0.85rem;">
            {{ h.ancienneBoxCode }}
          </span>
          <span *ngIf="!h.ancienneBoxCode" class="text-color-secondary">—</span>
        </td>

        <td class="text-center">
          <i class="pi pi-arrow-right" style="color:#059669; font-weight:bold;"></i>
        </td>

        <td>
          <span style="background:#dcfce7; color:#15803d;
                       padding:2px 10px; border-radius:20px;
                       font-size:0.85rem; font-weight:600;">
            {{ h.nouvelleBoxCode }}
          </span>
        </td>

        <td class="text-color-secondary">{{ h.motif || '—' }}</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td [attr.colspan]="6">
          <div class="flex flex-column align-items-center py-6 text-color-secondary">
            <i class="pi pi-inbox text-5xl mb-3"></i>
            <span>Aucun déplacement trouvé</span>
          </div>
        </td>
      </tr>
    </ng-template>

  </p-table>
</div>
