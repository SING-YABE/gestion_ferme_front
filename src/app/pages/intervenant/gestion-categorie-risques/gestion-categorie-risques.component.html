<div class="surface-card border-round-lg shadow-2 overflow-hidden">

  <!-- En-tête -->
  <div class="flex align-items-center justify-content-between flex-wrap gap-2 px-4 py-3"
       style="background: #2E7D32;">
    <div class="flex align-items-center gap-2">
      <i class="pi pi-exclamation-triangle text-white text-xl"></i>
      <h5 class="m-0 text-white font-semibold">Gestion des types de risques</h5>
    </div>
    <app-categorie-risques-form (onUpdate)="loadData()" mode="create"></app-categorie-risques-form>
  </div>

  <!-- Table -->
  <p-table
    [loading]="loading"
    [lazy]="true"
    [rows]="10"
    (onLazyLoad)="handleNext($event)"
    [rowsPerPageOptions]="[10, 30, 40]"
    [value]="categorieRisques"
    [paginator]="true"
    styleClass="p-datatable-sm p-datatable-hoverable-rows p-datatable-gridlines"
    [tableStyle]="{'min-width': '30rem'}">

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="name">Nom du type <p-sortIcon field="name"></p-sortIcon></th>
        <th pSortableColumn="description">Description <p-sortIcon field="description"></p-sortIcon></th>
        <th style="width: 110px; text-align: center;">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-categorie>
      <tr>
        <td><strong>{{ categorie.name }}</strong></td>
        <td>{{ categorie.description || 'Non défini' }}</td>
        <td>
          <div class="flex gap-1 justify-content-center">
            <app-categorie-risques-form [target]="categorie" mode="edit" (onUpdate)="loadData()"></app-categorie-risques-form>
            <button pButton icon="pi pi-trash"
                    class="p-button-rounded p-button-sm p-button-danger"
                    (click)="confirmDelete(categorie.id)"></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td [attr.colspan]="3">
          <div class="flex flex-column align-items-center py-6 text-color-secondary">
            <i class="pi pi-inbox text-5xl mb-3"></i>
            <span>Aucun type de risque trouvé</span>
          </div>
        </td>
      </tr>
    </ng-template>

  </p-table>
</div>

<p-confirmDialog [style]="{width: 'min(450px, 95vw)'}"></p-confirmDialog>
