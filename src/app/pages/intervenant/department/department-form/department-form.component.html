<!-- Bouton déclencheur create -->
<button *ngIf="mode == 'create'"
        pButton
        label="Ajouter"
        icon="pi pi-plus"
        class="p-button-sm"
        style="background: transparent; border: 2px solid white; color: white;"
        (click)="handleShow()">
</button>

<!-- Bouton déclencheur edit -->
<button *ngIf="mode == 'edit'"
        pButton
        icon="pi pi-pencil"
        class="p-button-rounded p-button-sm"
        style="background: #16A34A; border-color: #16A34A; color: white;"
        (click)="handleShow()">
</button>

<!-- Dialog -->
<p-dialog
    [header]="mode === 'create' ? 'Nouveau département' : 'Modifier département'"
    appendTo="body"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    [style]="{width: 'min(480px, 95vw)'}"
    [(visible)]="showForm">

  <form id="departmentForm" [formGroup]="departmentForm" (ngSubmit)="handleSubmit()" class="flex flex-column gap-3 pt-2">

    <div class="flex flex-column gap-1">
      <label for="name" class="font-medium text-sm">Nom</label>
      <input id="name" type="text" formControlName="name" pInputText
             placeholder="ex : Stratégie" class="w-full" />
    </div>

    <div class="flex flex-column gap-1">
      <label for="manager" class="font-medium text-sm">Manager</label>
      <p-dropdown formControlName="managerCuid" optionValue="cuid" [showClear]="true"
                  emptyMessage="Aucune proposition trouvée !" emptyFilterMessage="Aucune proposition trouvée !"
                  appendTo="body" [filter]="true" [options]="users" id="manager"
                  placeholder="Manager" styleClass="w-full">
        <ng-template pTemplate="filter" let-options="options">
          <div class="flex gap-1">
            <div class="p-inputgroup" (click)="$event.stopPropagation()">
              <span class="p-inputgroup-addon bg-white"><i class="pi pi-search"></i></span>
              <input type="text" pInputText placeholder="Rechercher ..."
                     formControlName="filterValue"
                     (input)="handleFilter($event)" />
            </div>
          </div>
        </ng-template>
        <ng-template pTemplate="selectedItem" let-selectedOption>
          <div class="flex align-content-start gap-3">
            <div class="flex-1">{{ selectedOption.displayname??selectedOption.displayName }}</div>
            <div><p-badge [value]="selectedOption.cuid"></p-badge></div>
          </div>
        </ng-template>
        <ng-template pTemplate="item" let-item>
          <div class="flex align-items-center gap-2">
            <fa-icon [icon]="faUser"></fa-icon>
            <div class="flex-1">{{ item.displayname??item.displayName }}</div>
            <div class="mr-2"><p-badge [value]="item.cuid"></p-badge></div>
          </div>
        </ng-template>
      </p-dropdown>
    </div>

    <div class="flex flex-column gap-1">
      <label for="direction" class="font-medium text-sm">Direction</label>
      <p-dropdown filterBy="name,description" formControlName="directionId" optionValue="id"
                  [showClear]="true" emptyMessage="Aucune proposition trouvée !"
                  emptyFilterMessage="Aucune proposition trouvée !" appendTo="body"
                  [filter]="true" [options]="directions" id="direction"
                  placeholder="Direction" styleClass="w-full">
        <ng-template pTemplate="item" let-item>
          <div class="flex align-items-center gap-2">
            <fa-icon [icon]="faBuilding"></fa-icon>
            <div class="flex-1">{{ item.description }}</div>
            <div class="mr-2"><p-badge [value]="item.name"></p-badge></div>
          </div>
        </ng-template>
        <ng-template pTemplate="selectedItem" let-selectedOption>
          <div class="flex align-content-start gap-2">
            <fa-icon class="text-primary font-bold" [icon]="faBuilding"></fa-icon>
            <div class="flex-1">{{ selectedOption.description }} / {{ selectedOption.name }}</div>
          </div>
        </ng-template>
      </p-dropdown>
    </div>

  </form>

  <ng-template pTemplate="footer">
    <div class="flex justify-content-end gap-2">
      <button type="button" pButton
              label="Annuler" icon="pi pi-times"
              class="p-button-outlined p-button-secondary p-button-sm"
              (click)="showForm=false">
      </button>
      <button type="submit" form="departmentForm" pButton
              [label]="mode === 'create' ? 'Enregistrer' : 'Mettre à jour'"
              icon="pi pi-check"
              class="p-button-success p-button-sm"
              [loading]="processing">
      </button>
    </div>
  </ng-template>

</p-dialog>
