<div class="settings-container">
  <div class="header">
    <h2>Paramétrage de la ferme</h2>
  </div>

  <div class="form-group">
    <label for="farmName">Nom de la ferme</label>
    <input
      id="farmName"
      type="text"
      [(ngModel)]="settings.farmName"
      placeholder="Ex : Ferme du Sahel"
    />
  </div>

  <div class="form-group">
    <label for="email">Email de contact</label>
    <input
      id="email"
      type="email"
      [(ngModel)]="settings.contactEmail"
      placeholder="contact@ferme.com"
    />
  </div>

  <button class="primary-btn" (click)="saveSettings()">
    💾 Enregistrer les paramètres
  </button>

  <div class="divider"></div>

  <div class="logo-section">
    <h3>Logo de la ferme</h3>
    
    <div class="logo-preview" *ngIf="logoUrl">
      <img [src]="logoUrl" alt="Logo ferme" />
    </div>

    <div class="file-upload-wrapper">
      <input 
        type="file" 
        id="fileInput"
        (change)="onFileSelected($event)"
        accept="image/*"
        hidden
      />
      <label for="fileInput" class="file-upload-label">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <span class="file-text">
          {{ selectedFileName || 'Choisir un fichier' }}
        </span>
      </label>
      
      <button 
        class="upload-btn" 
        (click)="uploadLogo()"
        [disabled]="!selectedFile"
      >
        Uploader
      </button>
    </div>

    <p class="hint">Format : JPG, PNG (max 2 Mo)</p>
  </div>
</div>
