<div class="surface-card border-round-lg shadow-2 overflow-hidden">

  <!-- En-tête -->
  <div class="flex align-items-center justify-content-between flex-wrap gap-2 px-4 py-3"
       style="background: #2E7D32;">
    <div class="flex align-items-center gap-2">
      <i class="pi pi-truck text-white text-xl"></i>
      <h5 class="m-0 text-white font-semibold">Gestion des fournisseurs</h5>
    </div>
    <app-fournisseur-form (onUpdate)="loadData()" mode="create"></app-fournisseur-form>
  </div>

  <!-- Table -->
  <p-table
    [value]="fournisseurs"
    [loading]="loading"
    [rows]="pageSize"
    [rowsPerPageOptions]="[5, 10, 30, 40]"
    [paginator]="fournisseurs.length > pageSize"
    styleClass="p-datatable-sm p-datatable-hoverable-rows p-datatable-gridlines"
    [tableStyle]="{'min-width': '30rem'}">

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="nom">Nom <p-sortIcon field="nom"></p-sortIcon></th>
        <th pSortableColumn="contact">Contact <p-sortIcon field="contact"></p-sortIcon></th>
        <th style="width: 110px; text-align: center;">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-fournisseur>
      <tr>
        <td><strong>{{ fournisseur.nom }}</strong></td>
        <td>{{ fournisseur.contact || 'Non renseigné' }}</td>
        <td>
          <div class="flex gap-1 justify-content-center">
            <app-fournisseur-form [target]="fournisseur" mode="edit" (onUpdate)="loadData()"></app-fournisseur-form>
            <button pButton icon="pi pi-trash"
                    class="p-button-rounded p-button-sm p-button-danger"
                    (click)="confirmDelete(fournisseur)"></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td [attr.colspan]="3">
          <div class="flex flex-column align-items-center py-6 text-color-secondary">
            <i class="pi pi-inbox text-5xl mb-3"></i>
            <span>Aucun fournisseur trouvé</span>
          </div>
        </td>
      </tr>
    </ng-template>

  </p-table>
</div>

<p-confirmDialog [style]="{width: 'min(450px, 95vw)'}"></p-confirmDialog>
