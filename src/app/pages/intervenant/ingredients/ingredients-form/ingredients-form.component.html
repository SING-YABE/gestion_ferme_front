<!-- Bouton déclencheur create -->
<button *ngIf="mode === 'create'"
        pButton
        icon="pi pi-plus"
        label="Ajouter"
        class="p-button-sm"
        style="background: transparent; border: 2px solid white; color: white;"
        (click)="handleShow()">
</button>

<!-- Bouton déclencheur edit -->
<button *ngIf="mode === 'edit'"
        pButton
        icon="pi pi-pencil"
        class="p-button-rounded p-button-sm"
        style="background: #16A34A; border-color: #16A34A; color: white;"
        (click)="handleShow()">
</button>

<!-- Dialog -->
<p-dialog
    [header]="mode === 'create' ? 'Nouvel ingrédient' : 'Modifier ingrédient'"
    [(visible)]="showForm"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    [style]="{width: 'min(480px, 95vw)'}">

  <form [formGroup]="form" class="flex flex-column gap-3 pt-2">

    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Nom de l'ingrédient</label>
      <input pInputText formControlName="nom" placeholder="Ex : Carbonate de calcium" class="w-full" />
    </div>

    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Type d'aliment</label>
      <p-dropdown
        [options]="typeAliments"
        optionLabel="libelle"
        optionValue="id"
        formControlName="typeAlimentId"
        (onChange)="onSelectType($event)"
        placeholder="Sélectionner un type d'aliment"
        styleClass="w-full">
      </p-dropdown>
    </div>

    <div class="flex flex-column gap-1">
      <label class="font-medium text-sm">Libellé (automatique)</label>
      <input pInputText formControlName="typeAlimentLibelle" placeholder="Ex : Minéraux" class="w-full" />
    </div>

  </form>

  <ng-template pTemplate="footer">
    <div class="flex justify-content-end gap-2">
      <button type="button" pButton
              label="Annuler" icon="pi pi-times"
              class="p-button-outlined p-button-secondary p-button-sm"
              (click)="showForm=false">
      </button>
      <button pButton
              [label]="mode === 'create' ? 'Enregistrer' : 'Mettre à jour'"
              icon="pi pi-check"
              class="p-button-success p-button-sm"
              [disabled]="form.invalid"
              [loading]="processing"
              (click)="handleSubmit()">
      </button>
    </div>
  </ng-template>

</p-dialog>
