<div class="surface-card border-round-lg shadow-2 overflow-hidden">

  <!-- En-tête -->
  <div class="flex align-items-center justify-content-between flex-wrap gap-2 px-4 py-3"
       style="background: #2E7D32;">
    <div class="flex align-items-center gap-2">
      <i class="pi pi-compass text-white text-xl"></i>
      <h5 class="m-0 text-white font-semibold">Gestion des directions</h5>
    </div>
    <app-direction-form (onUpdate)="loadData()" mode="create"></app-direction-form>
  </div>

  <!-- Table -->
  <p-table
    [loading]="loading"
    [lazy]="true"
    [rows]="pageSize"
    [totalRecords]="directions.totalElements"
    (onLazyLoad)="handleNext($event)"
    [rowsPerPageOptions]="[10, 30, 40]"
    [value]="directions.content"
    [paginator]="true"
    styleClass="p-datatable-sm p-datatable-hoverable-rows p-datatable-gridlines"
    [tableStyle]="{'min-width': '30rem'}">

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="description">Nom <p-sortIcon field="description"></p-sortIcon></th>
        <th pSortableColumn="name">Abrégé <p-sortIcon field="name"></p-sortIcon></th>
        <th pSortableColumn="director">Directeur <p-sortIcon field="director"></p-sortIcon></th>
        <th style="width: 110px; text-align: center;">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-direction>
      <tr>
        <td><strong>{{ direction.description }}</strong></td>
        <td>{{ direction.name }}</td>
        <td>
          @if (direction.directorName) {
            <div class="flex align-items-center">
              <i class="pi pi-user text-primary mr-2"></i>
              <span class="p-tag p-tag-rounded p-tag-info">{{ direction.directorName }}</span>
            </div>
          } @else if (direction.directorCuid) {
            <div class="flex align-items-center">
              <i class="pi pi-user text-secondary mr-2"></i>
              <span class="p-tag p-tag-rounded p-tag-secondary">{{ direction.directorCuid }}</span>
            </div>
          }
        </td>
        <td>
          <div class="flex gap-1 justify-content-center">
            <app-direction-form [target]="direction" mode="edit" (onUpdate)="loadData()"></app-direction-form>
            <button pButton icon="pi pi-trash"
                    class="p-button-rounded p-button-sm p-button-danger"
                    (click)="confirmDelete(direction)"></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td [attr.colspan]="4">
          <div class="flex flex-column align-items-center py-6 text-color-secondary">
            <i class="pi pi-inbox text-5xl mb-3"></i>
            <span>Aucune direction trouvée</span>
          </div>
        </td>
      </tr>
    </ng-template>

  </p-table>
</div>

<p-confirmDialog appendTo="body" [style]="{width: 'min(450px, 95vw)'}"></p-confirmDialog>
