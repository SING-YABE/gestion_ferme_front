<div class="surface-card border-round-lg shadow-2 overflow-hidden">

  <!-- En-tête -->
  <div class="flex align-items-center justify-content-between flex-wrap gap-2 px-4 py-3"
       style="background: #2E7D32;">
    <div class="flex align-items-center gap-2">
      <i class="pi pi-wallet text-white text-xl"></i>
      <h5 class="m-0 text-white font-semibold">Gestion des types de dépense</h5>
    </div>
    <button pButton
            label="Ajouter"
            icon="pi pi-plus"
            class="p-button-sm"
            style="background: transparent; border: 2px solid white; color: white;"
            (click)="handleShow('create')">
    </button>
  </div>

  <!-- Table -->
  <p-table
    [loading]="loading"
    [rows]="pageSize"
    [rowsPerPageOptions]="[5, 10, 30, 40]"
    [value]="typeDepenses"
    [paginator]="typeDepenses.length > pageSize"
    styleClass="p-datatable-sm p-datatable-hoverable-rows p-datatable-gridlines"
    [tableStyle]="{'min-width': '30rem'}">

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="nom">Nom <p-sortIcon field="nom"></p-sortIcon></th>
        <th style="width: 110px; text-align: center;">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-typeDepense>
      <tr>
        <td><strong>{{ typeDepense.nom }}</strong></td>
        <td>
          <div class="flex gap-1 justify-content-center">
            <button pButton icon="pi pi-pencil"
                    class="p-button-rounded p-button-sm"
                    style="background: #16A34A; border-color: #16A34A; color: white;"
                    (click)="handleShow('edit', typeDepense)"></button>
            <button pButton icon="pi pi-trash"
                    class="p-button-rounded p-button-sm p-button-danger"
                    (click)="confirmDelete(typeDepense)"></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td [attr.colspan]="2">
          <div class="flex flex-column align-items-center py-6 text-color-secondary">
            <i class="pi pi-inbox text-5xl mb-3"></i>
            <span>Aucun type de dépense trouvé</span>
          </div>
        </td>
      </tr>
    </ng-template>

  </p-table>
</div>

<app-type-depense-form
  [mode]="mode"
  [target]="selectedTypeDepense"
  [(showForm)]="showForm"
  (onUpdate)="loadData()"
></app-type-depense-form>

<p-confirmDialog [style]="{width: 'min(450px, 95vw)'}"></p-confirmDialog>
