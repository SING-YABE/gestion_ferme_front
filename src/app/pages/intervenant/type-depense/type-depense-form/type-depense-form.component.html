<!-- Dialog -->
<p-dialog
    [header]="mode === 'create' ? 'Nouveau type de dépense' : 'Modifier type de dépense'"
    appendTo="body"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    [baseZIndex]="9000"
    [style]="{width: 'min(480px, 95vw)'}"
    [(visible)]="showForm">

  <form [formGroup]="typeDepenseForm" (ngSubmit)="handleSubmit()" class="flex flex-column gap-3 pt-2">

    <div class="flex flex-column gap-1">
      <label for="nom" class="font-medium text-sm">Nom du type de dépense</label>
      <input id="nom" type="text" formControlName="nom" pInputText
             placeholder="Pour consommation" class="w-full" />
    </div>

  </form>

  <ng-template pTemplate="footer">
    <div class="flex justify-content-end gap-2">
      <button type="button" pButton
              label="Annuler" icon="pi pi-times"
              class="p-button-outlined p-button-secondary p-button-sm"
              (click)="showForm=false">
      </button>
      <button type="button" pButton
              [label]="mode === 'create' ? 'Enregistrer' : 'Mettre à jour'"
              icon="pi pi-check"
              class="p-button-success p-button-sm"
              [disabled]="typeDepenseForm.invalid"
              [loading]="processing"
              (click)="handleSubmit()">
      </button>
    </div>
  </ng-template>

</p-dialog>
