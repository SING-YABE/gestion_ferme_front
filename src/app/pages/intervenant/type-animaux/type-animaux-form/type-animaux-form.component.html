<!-- Bouton déclencheur create -->
<button *ngIf="mode == 'create'"
        pButton
        label="Ajouter"
        icon="pi pi-plus"
        class="p-button-sm"
        style="background: transparent; border: 2px solid white; color: white;"
        (click)="handleShow()">
</button>

<!-- Bouton déclencheur edit -->
<button *ngIf="mode == 'edit'"
        pButton
        icon="pi pi-pencil"
        class="p-button-rounded p-button-sm"
        style="background: #16A34A; border-color: #16A34A; color: white;"
        (click)="handleShow()">
</button>

<!-- Dialog -->
<p-dialog
    [header]="mode === 'create' ? 'Nouveau type animal' : 'Modifier type animal'"
    appendTo="body"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    [style]="{width: 'min(480px, 95vw)'}"
    [baseZIndex]="9000"
    [(visible)]="showForm">

  <form id="typeAnimauxForm" [formGroup]="typeAnimalForm" (ngSubmit)="handleSubmit()" class="flex flex-column gap-3 pt-2">

    <div class="flex flex-column gap-1">
      <label for="nom" class="font-medium text-sm">Nom du type animal</label>
      <input id="nom" type="text" formControlName="nom" pInputText
             placeholder="ex : Truie, Verrat, Porcelet..." class="w-full" />
    </div>

    <div class="flex flex-column gap-1">
      <label for="description" class="font-medium text-sm">Description</label>
      <input id="description" type="text" formControlName="description" pInputText
             placeholder="Description détaillée du type d'animal" class="w-full" />
    </div>

  </form>

  <ng-template pTemplate="footer">
    <div class="flex justify-content-end gap-2">
      <button type="button" pButton
              label="Annuler" icon="pi pi-times"
              class="p-button-outlined p-button-secondary p-button-sm"
              (click)="showForm=false">
      </button>
      <button type="submit" form="typeAnimauxForm" pButton
              [label]="mode === 'create' ? 'Enregistrer' : 'Mettre à jour'"
              icon="pi pi-check"
              class="p-button-success p-button-sm"
              [disabled]="typeAnimalForm.invalid"
              [loading]="processing">
      </button>
    </div>
  </ng-template>

</p-dialog>
