<div class="surface-card border-round-lg shadow-2 overflow-hidden">

  <!-- En-tête -->
  <div class="flex align-items-center justify-content-between flex-wrap gap-2 px-4 py-3"
       style="background: #2E7D32;">
    <div class="flex align-items-center gap-2">
      <i class="pi pi-apple text-white text-xl"></i>
      <h5 class="m-0 text-white font-semibold">Gestion des types d'aliments</h5>
    </div>
    <app-type-aliment-form (onUpdate)="loadData()" mode="create"></app-type-aliment-form>
  </div>

  <!-- Table -->
  <p-table
    [value]="typeAliments"
    [loading]="loading"
    [rows]="pageSize"
    [rowsPerPageOptions]="[5, 10, 30, 40]"
    [paginator]="typeAliments.length > pageSize"
    styleClass="p-datatable-sm p-datatable-hoverable-rows p-datatable-gridlines"
    [tableStyle]="{'min-width': '30rem'}">

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="libelle">Libellé <p-sortIcon field="libelle"></p-sortIcon></th>
        <th style="width: 110px; text-align: center;">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-typeAliment>
      <tr>
        <td><strong>{{ typeAliment.libelle }}</strong></td>
        <td>
          <div class="flex gap-1 justify-content-center">
            <app-type-aliment-form [target]="typeAliment" mode="edit" (onUpdate)="loadData()"></app-type-aliment-form>
            <button pButton icon="pi pi-trash"
                    class="p-button-rounded p-button-sm p-button-danger"
                    (click)="confirmDelete(typeAliment)"></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td [attr.colspan]="2">
          <div class="flex flex-column align-items-center py-6 text-color-secondary">
            <i class="pi pi-inbox text-5xl mb-3"></i>
            <span>Aucun type d'aliment trouvé</span>
          </div>
        </td>
      </tr>
    </ng-template>

  </p-table>
</div>

<p-confirmDialog [style]="{width: 'min(450px, 95vw)'}"></p-confirmDialog>
