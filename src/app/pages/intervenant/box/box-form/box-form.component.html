<button *ngIf="mode === 'create'" pButton label="Ajouter box"
        icon="pi pi-plus" class="p-button-success"
        (click)="handleShow()">
</button>

<button *ngIf="mode === 'edit'" pButton icon="pi pi-pencil"
        class="p-button-rounded"
        style="background:#16A34A; border-color:#16A34A; color:white;"
        (click)="handleShow()">
</button>

<p-dialog header="{{ mode === 'create' ? 'Nouvelle box' : 'Modifier box' }}"
          [(visible)]="showForm" [modal]="true" [style]="{width:'700px', height:'500px'}">
  <form [formGroup]="form">

    <!-- Bâtiment -->
    <div class="field mb-3">
      <label>Bâtiment <span style="color:red">*</span></label>
      <p-dropdown formControlName="batimentId"
                  [options]="batiments"
                  optionLabel="nom"
                  optionValue="id"
                  placeholder="Sélectionner un bâtiment"
                  [style]="{width:'100%', height:'45px'}"
                  styleClass="w-full">
        <ng-template let-b pTemplate="item">
          <div>
            <strong>{{ b.nom }}</strong>
            <div style="font-size:0.85rem; color:#6b7280;">{{ b.localisation }}</div>
          </div>
        </ng-template>
      </p-dropdown>
    </div>

    <!-- Numéro -->
    <div class="field mb-3">
      <label>Numéro de box <span style="color:red">*</span></label>
      <input type="number" min="1" formControlName="numero" pInputText
             placeholder="Ex: 5" class="w-full" style="height:45px;" />
    </div>

    <!-- Capacité -->
    <div class="field mb-3">
      <label>Capacité maximale <span style="color:red">*</span></label>
      <input type="number" min="1" formControlName="capaciteMax" pInputText
             placeholder="Ex: 10" class="w-full" style="height:45px;" />
    </div>

    <!-- Aperçu code généré -->
    <div *ngIf="apercuCode"
         style="background:#ecfdf5; padding:0.75rem 1rem; border-radius:8px; border-left:3px solid #059669; margin-top:0.5rem;">
      <span style="color:#047857; font-size:0.9rem;">Code généré : </span>
      <strong style="color:#059669;">{{ apercuCode }}</strong>
    </div>

  </form>

  <ng-template pTemplate="footer">
    <button type="button" pButton class="p-button-outlined p-button-danger mr-2"
            (click)="showForm=false">Annuler</button>
    <button pButton class="p-button-success"
            [disabled]="form.invalid" [loading]="processing"
            (click)="handleSubmit()">
      {{ mode === 'create' ? 'Enregistrer' : 'Mettre à jour' }}
    </button>
  </ng-template>
</p-dialog>
