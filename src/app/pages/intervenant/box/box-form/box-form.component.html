<!-- Bouton déclencheur create -->
<button *ngIf="mode === 'create'"
        pButton
        label="Ajouter"
        icon="pi pi-plus"
        class="p-button-sm"
        style="background: transparent; border: 2px solid white; color: white;"
        (click)="handleShow()">
</button>

<!-- Bouton déclencheur edit -->
<button *ngIf="mode === 'edit'"
        pButton
        icon="pi pi-pencil"
        class="p-button-rounded p-button-sm"
        style="background: #16A34A; border-color: #16A34A; color: white;"
        (click)="handleShow()">
</button>

<!-- Dialog -->
<p-dialog
    [header]="mode === 'create' ? 'Nouvelle box' : 'Modifier box'"
    [(visible)]="showForm"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    [style]="{width: 'min(480px, 95vw)'}">

  <form [formGroup]="form" class="flex flex-column gap-3 pt-2">

    <div class="flex flex-column gap-1">
      <label for="batimentId" class="font-medium text-sm">Bâtiment <span style="color:red">*</span></label>
      <p-dropdown id="batimentId" formControlName="batimentId"
                  [options]="batiments" optionLabel="nom" optionValue="id"
                  placeholder="Sélectionner un bâtiment" styleClass="w-full">
        <ng-template let-b pTemplate="item">
          <div>
            <strong>{{ b.nom }}</strong>
            <div style="font-size:0.85rem; color:#6b7280;">{{ b.localisation }}</div>
          </div>
        </ng-template>
      </p-dropdown>
    </div>

    <div class="flex flex-column gap-1">
      <label for="numero" class="font-medium text-sm">Numéro de box <span style="color:red">*</span></label>
      <input id="numero" type="number" min="1" formControlName="numero" pInputText
             placeholder="Ex: 5" class="w-full" />
    </div>

    <div class="flex flex-column gap-1">
      <label for="capaciteMax" class="font-medium text-sm">Capacité maximale <span style="color:red">*</span></label>
      <input id="capaciteMax" type="number" min="1" formControlName="capaciteMax" pInputText
             placeholder="Ex: 10" class="w-full" />
    </div>

    <div *ngIf="apercuCode"
         style="background:#ecfdf5; padding:0.75rem 1rem; border-radius:8px; border-left:3px solid #059669;">
      <span style="color:#047857; font-size:0.9rem;">Code généré : </span>
      <strong style="color:#059669;">{{ apercuCode }}</strong>
    </div>

  </form>

  <ng-template pTemplate="footer">
    <div class="flex justify-content-end gap-2">
      <button type="button" pButton
              label="Annuler" icon="pi pi-times"
              class="p-button-outlined p-button-secondary p-button-sm"
              (click)="showForm=false">
      </button>
      <button pButton
              [label]="mode === 'create' ? 'Enregistrer' : 'Mettre à jour'"
              icon="pi pi-check"
              class="p-button-success p-button-sm"
              [disabled]="form.invalid"
              [loading]="processing"
              (click)="handleSubmit()">
      </button>
    </div>
  </ng-template>

</p-dialog>
